name: SEO Weekly Position Check

on:
  schedule:
    # Every Monday at 12:00 UTC (9:00 AM LATAM / 15:00 MSK)
    - cron: '0 12 * * 1'
  workflow_dispatch: # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  check-positions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run weekly SEO check
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          GSC_CLIENT_ID: ${{ secrets.GSC_CLIENT_ID }}
          GSC_CLIENT_SECRET: ${{ secrets.GSC_CLIENT_SECRET }}
          GSC_REFRESH_TOKEN: ${{ secrets.GSC_REFRESH_TOKEN }}
        run: node seo-tracking/scripts/weekly-check.mjs

      - name: Commit snapshot
        run: |
          git config user.name "SEO Bot"
          git config user.email "seo-bot@firmalo.io"
          git add seo-tracking/snapshots/
          git diff --staged --quiet || git commit -m "chore: weekly SEO position snapshot $(date +%Y-%m-%d)"
          git push
